    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"      test: ["CMD-SHELL",timeout: 5s
      retries: 5
    networks:
      - back-tier
volumes:
  db-data:
networks:
  front-tier:
  back-tier:
